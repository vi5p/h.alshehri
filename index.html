<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشاعرك لعيد الفطر السعيد</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-image: url('https://files.manuscdn.com/user_upload_by_module/session_file/310519663387136322/vLDnYoPjbhohStTy.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        /* طبقة شفافة فوق الخلفية لجعل النص واضحاً */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.35);
            z-index: -1;
        }
        .card {
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            background: rgba(255, 255, 255, 0.97);
            border: 3px solid #FFD700;
        }
        .btn-primary {
            background-color: #FF6B6B;
            border: none;
            font-weight: bold;
            padding: 12px;
            font-size: 1.1rem;
        }
        .btn-primary:hover {
            background-color: #FF5252;
            transform: scale(1.02);
            transition: 0.3s;
        }
        h2 {
            color: #FF6B6B;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        label {
            font-weight: 600;
            color: #333;
        }
        .form-control {
            border-radius: 10px;
            border: 2px solid #FFD700;
        }
        .form-control:focus {
            border-color: #FF6B6B;
            box-shadow: 0 0 0 0.2rem rgba(255, 107, 107, 0.25);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-5">
                    <h2 class="text-center mb-4">عيد فطر سعيد! 🌙✨</h2>
                    <p class="text-center text-muted mb-4">أهلاً بكم طلابي الأعزاء، شاركونا فرحتكم بالعيد</p>
                    <form id="studentForm">
                        <div class="mb-4">
                            <label for="studentName" class="form-label">الاسم الكامل:</label>
                            <input type="text" class="form-control form-control-lg" id="studentName" required placeholder="اكتب اسمك هنا">
                        </div>
                        <div class="mb-4">
                            <label for="feelings" class="form-label">صف مشاعرك لعيد الفطر السعيد؟</label>
                            <textarea class="form-control form-control-lg" id="feelings" rows="4" required placeholder="عبر عن مشاعرك وفرحتك..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">إرسال الإجابة 🎈</button>
                    </form>
                    <div id="successMsg" class="alert alert-success mt-4 d-none text-center" role="alert">
                        تم إرسال إجابتك بنجاح! عيدك مبارك. 🎉
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('studentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('studentName').value;
            const feelings = document.getElementById('feelings').value;
            const timestamp = new Date().toLocaleString('ar-EG');

            let responses = JSON.parse(localStorage.getItem('eidResponses')) || [];
            responses.push({ name, feelings, timestamp });
            localStorage.setItem('eidResponses', JSON.stringify(responses));

            document.getElementById('successMsg').classList.remove('d-none');
            this.reset();

            setTimeout(() => {
                document.getElementById('successMsg').classList.add('d-none');
            }, 4000);
        });
    </script>
</body>
</html>
