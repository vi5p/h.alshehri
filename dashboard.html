<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المعلم - إجابات الطلاب</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-image: url('https://files.manuscdn.com/user_upload_by_module/session_file/310519663387136322/vLDnYoPjbhohStTy.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.4);
            z-index: -1;
        }
        .container {
            max-width: 1000px;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            background: rgba(255, 255, 255, 0.98);
            border: 3px solid #FFD700;
        }
        .table-container {
            background-color: rgba(255, 255, 255, 0.99);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border: 2px solid #FFD700;
        }
        .table-dark {
            background-color: #FF6B6B;
            border-color: #FF6B6B;
        }
        .table-dark th {
            background-color: #FF6B6B;
            color: white;
        }
        .btn-danger {
            background-color: #FF6B6B;
            border: none;
            font-weight: bold;
        }
        .btn-danger:hover {
            background-color: #FF5252;
        }
        h2 {
            color: #FF6B6B;
            font-weight: bold;
        }
        h4 {
            color: #FF6B6B;
        }
        .table-striped tbody tr:nth-of-type(odd) {
            background-color: rgba(255, 107, 107, 0.05);
        }
        .table-hover tbody tr:hover {
            background-color: rgba(255, 107, 107, 0.15);
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <div class="card p-4 mb-4 text-center">
            <h2>لوحة تحكم المعلم 📋✨</h2>
            <p class="text-muted">هنا تظهر جميع إجابات الطلاب التي تم إرسالها بمناسبة العيد.</p>
        </div>

        <div class="table-container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="mb-0">إجابات الطلاب:</h4>
                <button id="clearData" class="btn btn-danger btn-sm">مسح جميع البيانات 🗑️</button>
            </div>
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th style="width: 50px;">#</th>
                            <th style="width: 200px;">الاسم</th>
                            <th>المشاعر</th>
                            <th style="width: 180px;">الوقت</th>
                        </tr>
                    </thead>
                    <tbody id="responsesTable">
                        <!-- سيتم ملء البيانات هنا بواسطة JavaScript -->
                    </tbody>
                </table>
            </div>
            <div id="noDataMsg" class="text-center text-muted py-5 d-none">
                <h5>لا توجد إجابات حالياً. بانتظار مشاركات الطلاب! 🎈</h5>
            </div>
        </div>
    </div>

    <script>
        function loadResponses() {
            const responses = JSON.parse(localStorage.getItem('eidResponses')) || [];
            const tableBody = document.getElementById('responsesTable');
            const noDataMsg = document.getElementById('noDataMsg');
            
            tableBody.innerHTML = '';

            if (responses.length === 0) {
                noDataMsg.classList.remove('d-none');
            } else {
                noDataMsg.classList.add('d-none');
                responses.forEach((resp, index) => {
                    const row = `
                        <tr>
                            <td><strong>${index + 1}</strong></td>
                            <td>${resp.name}</td>
                            <td>${resp.feelings}</td>
                            <td><small class="text-muted">${resp.timestamp}</small></td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
            }
        }

        document.getElementById('clearData').addEventListener('click', function() {
            if (confirm('هل أنت متأكد من مسح جميع إجابات الطلاب؟')) {
                localStorage.removeItem('eidResponses');
                loadResponses();
            }
        });

        window.onload = loadResponses;
    </script>
</body>
</html>
